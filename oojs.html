<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Objektumorientált JS (OOJS)</title>
    <link rel="stylesheet" href="index.css">
    <script src="oojs.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html">⬅ Vissza a főoldalra</a>
    </nav>

    <header>
        <h1>Objektumorientált JavaScript</h1>
    </header>

    <main>
        <div id="controls" style="text-align: center; margin-bottom: 20px;">
            <h2>Alakzat Generáló</h2>
            <p>Kattints a gombokra új objektumok létrehozásához a képernyőn!</p>
            <button class="save-btn" onclick="spawnCircle()">Új Kör (Circle)</button>
            <button class="edit-btn" onclick="spawnSquare()">Új Négyzet (Square)</button>
        </div>
        </main>

    <footer>
        Készítette: Kovács Ákos (FIY9TP) és Kovács Balázs (LVA07D)
    </footer>
</body>
</html>
