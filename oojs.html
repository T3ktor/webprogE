<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Objektumorientált JS (OOJS)</title>
    <link rel="stylesheet" href="index.css">
    <script src="oojs.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html">⬅ Vissza a főoldalra</a>
    </nav>
    
    <div id="controls">
