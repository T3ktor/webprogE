<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Fetch API CRUD</title>
    <link rel="stylesheet" href="index.css">
    <script src="fetchapi.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html">⬅ Vissza a főoldalra</a>
    </nav>

    <header>
        <h1>Helységek kezelése (Fetch API)</h1>
    </header>

    <main>
        <h2>Adatbázis műveletek</h2>
        <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <input type="hidden" id="f_helysegId">
            <div class="form-group">
                <label>Város neve:</label>
                <input type="text" id="f_nev" placeholder="Pl. Budapest">
            </div>
            <div class="form-group">
                <label>Ország:</label>
                <input type="text" id="f_orszag" placeholder="Pl. Magyarország">
            </div>
            <button class="save-btn" onclick="saveItem()">Mentés az adatbázisba</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Név</th>
                    <th>Ország</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="fetchTableBody">
                </tbody>
        </table>
    </main>

    <footer>
        Készítette: Kovács Ákos (FIY9TP) és Kovács Balázs (LVA07D)
    </footer>
</body>
</html>
