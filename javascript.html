<!DOCTYPE html>
<html lang="hu">
<head>
    <script src="javascript.js"></script>
    <meta charset="UTF-8">
    <title>JavaScript CRUD - Helységek</title>
</head>
<body>
    <nav><a href="index.html">⬅ Vissza a főoldalra</a></nav>
    <h1>Helységek kezelése (JS CRUD)</h1>
    
    <div style="background: #f9f9f9; padding: 15px; width: 57%;">
        <input type="hidden" id="helysegId">
        <div class="form-group">
            <label>Helység neve:</label>
            <input type="text" id="nev">
        </div>
        <div class="form-group">
            <label>Ország:</label>
            <input type="text" id="orszag">
        </div>
        <button onclick="saveItem()">Mentés</button>
    </div>

    <table>
        <thead>
            <tr><th>ID</th><th>Név</th><th>Ország</th><th>Műveletek</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</body>
</html>
