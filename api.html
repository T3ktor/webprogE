<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helység Kezelő</title>
    <link rel="stylesheet" href="api.css">
</head>
<body>

<div class="container">
    <h2>📍 Helységek kezelése</h2>

    <form id="helysegForm">
        <input type="hidden" id="helysegId">
        <input type="text" id="nev" placeholder="Város név" required>
        <input type="text" id="orszag" placeholder="Ország" required>
        <button type="submit" id="submitBtn" class="btn-add">Hozzáadás</button>
        <button type="button" id="cancelBtn" style="display:none;" onclick="resetForm()">Mégse</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Név</th>
                <th>Ország</th>
                <th>Műveletek</th>
            </tr>
        </thead>
        <tbody id="helysegTableBody">
            </tbody>
    </table>
</div>

<script>
    const API_URL = 'api.php'; // A PHP fájlod neve

    document.addEventListener('DOMContentLoaded', loadData);
    document.getElementById('helysegForm').addEventListener('submit', handleFormSubmit);

    // Adatok betöltése (GET)
    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const tbody = document.getElementById('helysegTableBody');
        tbody.innerHTML = '';

        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.nev}</td>
                    <td>${item.orszag}</td>
                    <td>
                        <button class="btn-edit" onclick="prepareEdit(${item.id}, '${item.nev}', '${item.orszag}')">Szerkeszt</button>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">Törlés</button>
                    </td>
                </tr>
            `;
        });
    }

    // Küldés (POST vagy PUT)
    async function handleFormSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('helysegId').value;
        const nev = document.getElementById('nev').value;
        const orszag = document.getElementById('orszag').value;
        
        const method = id ? 'PUT' : 'POST';
        const body = { nev, orszag };
        if (id) body.id = id;

        await fetch(API_URL, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        resetForm();
        loadData();
    }

    // Törlés (DELETE)
    async function deleteItem(id) {
        if (!confirm('Biztosan törölni akarod?')) return;
        
        await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
        loadData();
    }

    // Szerkesztés előkészítése
    function prepareEdit(id, nev, orszag) {
        document.getElementById('helysegId').value = id;
        document.getElementById('nev').value = nev;
        document.getElementById('orszag').value = orszag;
        document.getElementById('submitBtn').innerText = 'Frissítés';
        document.getElementById('submitBtn').className = 'btn-edit';
        document.getElementById('cancelBtn').style.display = 'inline-block';
    }

    // Form alaphelyzetbe állítása
    function resetForm() {
        document.getElementById('helysegId').value = '';
        document.getElementById('nev').value = '';
        document.getElementById('orszag').value = '';
        document.getElementById('submitBtn').innerText = 'Hozzáadás';
        document.getElementById('submitBtn').className = 'btn-add';
        document.getElementById('cancelBtn').style.display = 'none';
    }
</script>

</body>
</html>
